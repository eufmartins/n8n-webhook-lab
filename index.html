<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Teste n8n</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="app">
    <header>
      <h1>⚡ n8n Webhook Lab</h1>
      <p>Testes de PR, Webhook e CI/CD</p>
    </header>

    <section class="card">
      <h2>Criar Nova Tarefa</h2>
      <form id="taskForm">
        <input type="text" id="taskInput" placeholder="Digite uma tarefa..." required />
        <button type="submit">Adicionar</button>
      </form>
    </section>

    <section class="card">
      <h2>Lista de Tarefas</h2>
      <ul id="taskList"></ul>
    </section>

    <section class="card">
      <h2>Simular Webhook</h2>
      <button id="webhookBtn">Enviar Evento</button>
      <p id="webhookStatus"></p>
    </section>

    <footer>
      <p>Feito para testes de CI/CD 🚀</p>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>

</html>
